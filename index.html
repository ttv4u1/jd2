    <style>
        :root {
            --primary: #2563eb;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;

        }

        h1, h2, h3, .font-heading { font-family: 'Montserrat', sans-serif; }
        .font-mono-corp { font-family: 'Share Tech Mono', monospace; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            padding: 0.75rem;
            color: white !important;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }

        .label-corp {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.35rem;
            display: block;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            font-weight: 700;
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            font-size: 0.875rem;
        }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        #loginScreen {
            position: fixed; inset: 0; z-index: 1000;
            background: #000; display: flex; align-items: center; justify-content: center;
        }

        /* Responsive Table */
        .table-container { overflow-x: auto; border-radius: 1rem; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: rgba(0,0,0,0.3); padding: 1rem; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }
        td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Custom Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .swal-corp {

            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginScreen">
        <div class="glass-card p-10 max-w-md w-full text-center shadow-2xl">
            <img src="https://github.com/ttv4u1/KP/raw/main/DVS.svg" class="h-24 mx-auto mb-6">
            <h2 class="text-3xl font-heading font-extrabold mb-2">PILOT CLOUD</h2>
            <p class="text-slate-400 mb-8 font-medium">Sistem Pengurusan Data Pemandu Veterinar</p>
            <button onclick="login()" class="flex items-center justify-center gap-4 w-full py-4 px-6 rounded-xl font-bold border border-white/10 bg-white/5 hover:bg-white/10 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-6">
                <span>LOG MASUK GOOGLE</span>
            </button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="container mx-auto mb-8">
            <div class="glass-card p-6 flex flex-wrap justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <img src="https://github.com/ttv4u1/KP/raw/main/DVS.svg" class="h-14">
                    <div>
                        <h1 class="text-xl md:text-2xl font-heading font-extrabold tracking-tight">PILOT v17.2</h1>
                        <div class="flex items-center gap-2">
                            <img id="userAvatar" class="h-6 w-6 rounded-full ring-2 ring-blue-500/20">
                            <span id="userName" class="text-sm font-semibold text-blue-400">---</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-6 bg-black/30 px-6 py-4 rounded-2xl border border-white/5">
                    <div class="text-right">
                        <p id="realDay" class="text-xs font-bold text-blue-500 uppercase">---</p>
                        <p id="realDate" class="text-sm font-medium text-slate-400">--/--/----</p>
                    </div>
                    <div class="h-10 w-[1px] bg-white/10"></div>
                    <h1 id="realTime" class="text-2xl md:text-4xl font-mono-corp font-bold text-white">00:00:00</h1>
                </div>

                <button onclick="logout()" class="text-xs font-bold text-red-400 hover:text-red-300 uppercase tracking-widest">Logout 🔒</button>
            </div>
        </header>

        <main class="container mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- INPUT COLUMN -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 border-t-4 border-blue-600 shadow-xl">
                    <div class="mb-6 flex bg-black/40 p-1 rounded-xl">
                        <button onclick="setType('tugas')" id="btnTugas" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all bg-blue-600">Tugas</button>
                        <button onclick="setType('log')" id="btnLog" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all text-slate-500">Gerak</button>
                        <button onclick="setType('minyak')" id="btnMinyak" class="flex-1 py-3 text-sm font-bold rounded-lg transition-all text-slate-500">Minyak</button>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="label-corp">Tarikh Rekod</label>
                            <input type="text" id="datePicker" class="input-field w-full">
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div><label class="label-corp">Mula</label><input type="text" id="timeFrom" class="input-field w-full font-mono-corp text-center"></div>
                            <div><label class="label-corp">Trans</label><input type="text" id="timeSemasa" class="input-field w-full font-mono-corp text-center"></div>
                            <div><label class="label-corp">Akhir</label><input type="text" id="timeTo" class="input-field w-full font-mono-corp text-center"></div>
                        </div>

                        <div id="odoFields" class="hidden grid grid-cols-2 gap-3 p-4 bg-blue-500/5 rounded-xl border border-blue-500/10">
                            <div class="col-span-2"><label class="label-corp text-blue-400">Odometer (KM)</label></div>
                            <input type="number" id="odoStart" class="input-field" placeholder="Terakhir">
                            <input type="number" id="odoEnd" class="input-field" placeholder="Semasa">
                        </div>

                        <div id="fuelFields" class="hidden space-y-4 p-4 bg-red-500/5 rounded-xl border border-red-500/10">
                            <label class="label-corp text-red-400">Pengisian Minyak (RM)</label>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="rmInitial" class="input-field" placeholder="Isian">
                                <input type="number" id="rmOffice" class="input-field" placeholder="Lain-lain">
                            </div>
                            <select id="fuelType" class="input-field w-full">
                                <option>RON 95</option><option>RON 97</option><option>DIESEL</option>
                            </select>
                        </div>

                        <div>
                            <label class="label-corp">Butiran Tugasan / Laluan</label>
                            <textarea id="taskInput" rows="3" class="input-field w-full" placeholder="Masukkan perincian..."></textarea>
                        </div>

                        <button onclick="saveEntry()" class="w-full btn-primary py-4 shadow-lg shadow-blue-500/20">Sync Data ke Cloud ☁️</button>
                    </div>
                </div>

                <!-- EXPORT HUB -->
                <div class="glass-card p-6 space-y-3">
                    <p class="label-corp">Eksport Laporan Rasmi</p>
                    <button onclick="generateOfficialPDF()" class="w-full py-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold text-sm transition shadow-lg">📄 MUAT TURUN PDF RASMI</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportExcel()" class="bg-emerald-600/20 hover:bg-emerald-600 text-emerald-400 hover:text-white p-3 rounded-xl text-xs font-bold border border-emerald-500/20 transition">EXCEL</button>
                        <button onclick="exportWord()" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white p-3 rounded-xl text-xs font-bold border border-blue-500/20 transition">WORD</button>
                        <button onclick="exportPPT()" class="bg-orange-600/20 hover:bg-orange-600 text-orange-400 hover:text-white p-3 rounded-xl text-xs font-bold border border-orange-500/20 transition">POWERPOINT</button>
                        <button onclick="exportNotepad()" class="bg-slate-600/20 hover:bg-slate-600 text-slate-400 hover:text-white p-3 rounded-xl text-xs font-bold border border-slate-500/20 transition">NOTEPAD / ++</button>
                    </div>
                    <button onclick="shareToNotes()" class="w-full py-3 bg-indigo-600/20 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-500/30 rounded-xl font-bold text-xs transition">📱 SIMPAN KE SMARTPHONE NOTES</button>
                </div>
            </div>

            <!-- LIST COLUMN -->
            <div class="lg:col-span-8">
                <div class="glass-card flex flex-col h-full overflow-hidden shadow-2xl">
                    <div class="p-6 bg-white/5 border-b border-white/5 flex justify-between items-center">
                        <h3 class="font-heading font-bold text-sm uppercase tracking-widest text-blue-400">Live Database Feed</h3>
                        <button onclick="showMonthSummary()" class="px-4 py-2 bg-blue-500/10 hover:bg-blue-500/20 border border-blue-500/30 rounded-full text-xs font-bold text-blue-400 uppercase">Analitik Bulanan</button>
                    </div>
                    <div class="table-container p-2">
                        <table>
                            <thead>
                                <tr>
                                    <th>Tarikh & Hari</th>
                                    <th>Butiran Perincian</th>
                                    <th class="text-right">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody id="activeBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- PDF TEMPLATE (HIDDEN) -->
    <div id="reportTemplate" class="hidden" style="color: black; background: white; padding: 40px; font-family: Arial, sans-serif;">
        <div style="border-bottom: 3px solid #000; padding-bottom: 20px; display: flex; align-items: center; justify-content: space-between;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" width="80">
            <div style="text-align: center;">
                <h2 style="margin: 0; font-size: 18px;">JABATAN PERKHIDMATAN VETERINAR</h2>
                <p style="margin: 5px 0; font-size: 12px;">Penyata Log Pergerakan & Tugasan Bulanan</p>
            </div>
            <img src="https://github.com/ttv4u1/KP/raw/main/DVS.svg" width="80">
        </div>
        <div id="pdfContentArea" style="margin-top: 30px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyBCV-68YWkZkDjIodxWmn6z-d9H7ZS8bDs",
          authDomain: "bpk-cloud-system.firebaseapp.com",
          projectId: "bpk-cloud-system",
          storageBucket: "bpk-cloud-system.firebasestorage.app",
          messagingSenderId: "690773145817",
          appId: "1:690773145817:web:4a6638d25d572499fb66c8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let tasks = [];
        window.currentType = 'tugas';

        // --- AUTH LOGIC ---
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL;
                syncData();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        });

        async function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (e) { await auth.signInWithRedirect(provider); }
        }
        function logout() { auth.signOut(); }

        // --- CORE FUNCTIONS ---
        function syncData() {
            db.collection("users").doc(currentUser.uid).collection("logs")
              .orderBy("id", "desc")
              .onSnapshot(snap => {
                  tasks = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                  renderUI();
              });
        }

        function setType(type) {
            window.currentType = type;
            const btns = ['btnTugas', 'btnLog', 'btnMinyak'];
            btns.forEach(id => document.getElementById(id).className = "flex-1 py-3 text-sm font-bold rounded-lg transition-all text-slate-500");
            
            document.getElementById('odoFields').classList.add('hidden');
            document.getElementById('fuelFields').classList.add('hidden');

            const activeBtn = document.getElementById(type === 'tugas' ? 'btnTugas' : type === 'log' ? 'btnLog' : 'btnMinyak');
            const colorClass = type === 'tugas' ? 'bg-blue-600 text-white' : type === 'log' ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white';
            activeBtn.className = `flex-1 py-3 text-sm font-bold rounded-lg transition-all ${colorClass}`;

            if(type === 'log') document.getElementById('odoFields').classList.remove('hidden');
            if(type === 'minyak') {
                document.getElementById('odoFields').classList.remove('hidden');
                document.getElementById('fuelFields').classList.remove('hidden');
            }
        }

        async function saveEntry() {
            const date = document.getElementById('datePicker').value;
            const tFrom = document.getElementById('timeFrom').value;
            if(!date || !tFrom) return Swal.fire('Ralat', 'Sila isi Tarikh dan Masa Mula.', 'error');

            const oStart = parseFloat(document.getElementById('odoStart').value) || 0;
            const oEnd = parseFloat(document.getElementById('odoEnd').value) || 0;
            const rm1 = parseFloat(document.getElementById('rmInitial').value) || 0;
            const rm2 = parseFloat(document.getElementById('rmOffice').value) || 0;

            const entry = {
                id: Date.now(),
                type: window.currentType,
                date: date,
                day: getDayName(date),
                monthYear: date.split('-')[1] + '-' + date.split('-')[2],
                tFrom, tSemasa: document.getElementById('timeSemasa').value || '-', tTo: document.getElementById('timeTo').value || '-',
                odoStart: oStart, odoEnd: oEnd,
                dist: (oEnd > oStart) ? (oEnd - oStart) : 0,
                rmMinyak: rm1 + rm2,
                fuelType: document.getElementById('fuelType').value,
                note: document.getElementById('taskInput').value || '-'
            };

            await db.collection("users").doc(currentUser.uid).collection("logs").add(entry);
            Swal.fire({ icon: 'success', title: 'Berjaya Disimpan', timer: 1000, showConfirmButton: false, customClass: {popup: 'swal-corp'} });
            ['odoStart','odoEnd','rmInitial','rmOffice','taskInput'].forEach(id => document.getElementById(id).value = '');
        }

        function getDayName(dateStr) {
            const parts = dateStr.split('-');
            const date = new Date(parts[2], parts[1]-1, parts[0]);
            return ["AHAD","ISNIN","SELASA","RABU","KHAMIS","JUMAAT","SABTU"][date.getDay()];
        }

        function renderUI() {
            const body = document.getElementById('activeBody');
            body.innerHTML = '';
            
            tasks.forEach(t => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors cursor-pointer group";
                tr.onclick = () => showDetails(t);
                tr.innerHTML = `
                    <td>
                        <div class="font-bold text-sm text-white">${t.date}</div>
                        <div class="text-xs text-blue-500 font-bold tracking-tighter">${t.day}</div>
                    </td>
                    <td>
                        <div class="text-sm font-medium text-slate-200 line-clamp-1">${t.note}</div>
                        <div class="text-[10px] mt-1 flex gap-3">
                            <span class="text-slate-500 font-mono-corp uppercase">${t.tFrom} - ${t.tTo}</span>
                            ${t.dist > 0 ? `<span class="text-emerald-500 font-bold">● ${t.dist} KM</span>` : ''}
                            ${t.rmMinyak > 0 ? `<span class="text-red-500 font-bold">● RM ${t.rmMinyak.toFixed(2)}</span>` : ''}
                        </div>
                    </td>
                    <td class="text-right">
                        <button onclick="event.stopPropagation(); deleteEntry('${t.docId}')" class="opacity-0 group-hover:opacity-100 p-2 text-red-500/50 hover:text-red-500 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        // --- EXPORT ENGINES ---
        function exportExcel() {
            const data = tasks.map(t => ({
                "TARIKH": t.date,
                "HARI": t.day,
                "MASA": `${t.tFrom} - ${t.tTo}`,
                "JENIS": t.type.toUpperCase(),
                "TUGASAN": t.note,
                "JARAK (KM)": t.dist,
                "MINYAK (RM)": t.rmMinyak.toFixed(2)
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Log");
            XLSX.writeFile(wb, `Log_Pilot_${Date.now()}.xlsx`);
        }

        function exportWord() {
            let content = "LAPORAN LOG PILOT VETERINAR\n==========================\n\n";
            tasks.forEach(t => {
                content += `TARIKH: ${t.date} (${t.day})\nMASA: ${t.tFrom} - ${t.tTo}\nNOTA: ${t.note}\nJARAK: ${t.dist} KM | RM: ${t.rmMinyak}\n--------------------------\n`;
            });
            const blob = new Blob([content], { type: "application/msword" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Laporan_Pilot.doc";
            link.click();
        }

        function exportPPT() {
            let pptx = new PptxGenJS();
            tasks.slice(0, 10).forEach(t => {
                let slide = pptx.addSlide();
                slide.addText(`LAPORAN: ${t.date} (${t.day})`, { x: 0.5, y: 0.5, fontSize: 24, bold: true, color: '2563EB' });
                slide.addText(`Masa: ${t.tFrom} - ${t.tTo}\nTugasan: ${t.note}\nJarak: ${t.dist} KM\nMinyak: RM ${t.rmMinyak}`, { x: 0.5, y: 1.5, fontSize: 18 });
            });
            pptx.writeFile({ fileName: 'Ringkasan_Pilot.pptx' });
        }

        function exportNotepad() {
            let text = tasks.map(t => `${t.date} [${t.day}] | ${t.tFrom}-${t.tTo} | ${t.note} | ${t.dist}KM`).join('\r\n');
            const blob = new Blob([text], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Log_Notepad.txt";
            link.click();
        }

        async function shareToNotes() {
            const latest = tasks.slice(0, 5).map(t => `📅 ${t.date} (${t.day})\n⏰ ${t.tFrom}-${t.tTo}\n📝 ${t.note}\n📍 ${t.dist}KM | RM${t.rmMinyak.toFixed(2)}\n`).join('\n---\n');
            const shareData = {
                title: 'PILOT Log Update',
                text: latest
            };

            if (navigator.share) {
                try { await navigator.share(shareData); } catch (err) { console.log('Share failed'); }
            } else {
                await Swal.fire('Info', 'Sila salin teks ini secara manual untuk Notes: \n\n' + latest, 'info');
            }
        }

        function showMonthSummary() {
            const curMY = (new Date().getMonth()+1).toString().padStart(2,'0') + '-' + new Date().getFullYear();
            const monthData = tasks.filter(t => t.monthYear === curMY);
            const tKM = monthData.reduce((s,t) => s + (t.dist || 0), 0);
            const tRM = monthData.reduce((s,t) => s + (t.rmMinyak || 0), 0);

            Swal.fire({
                title: `<span class="text-xl font-heading font-extrabold uppercase text-blue-500">Analitik ${curMY}</span>`,
                html: `
                    <div class="grid grid-cols-2 gap-4 mt-4">
                        <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                            <p class="text-[10px] text-slate-500 font-bold uppercase">Jumlah Jarak</p>
                            <p class="text-2xl font-mono-corp font-bold text-emerald-500">${tKM} KM</p>
                        </div>
                        <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                            <p class="text-[10px] text-slate-500 font-bold uppercase">Jumlah Kos</p>
                            <p class="text-2xl font-mono-corp font-bold text-red-500">RM ${tRM.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="mt-6 space-y-2 text-left">
                        <div onclick="showCategory('tugas')" class="p-4 bg-white/5 rounded-xl flex justify-between cursor-pointer hover:bg-white/10 border border-white/5 transition">
                            <span class="text-sm font-bold">📋 Butiran Tugas</span>
                            <span class="text-blue-500">➔</span>
                        </div>
                        <div onclick="showCategory('log')" class="p-4 bg-white/5 rounded-xl flex justify-between cursor-pointer hover:bg-white/10 border border-white/5 transition">
                            <span class="text-sm font-bold">🚚 Butiran Gerak</span>
                            <span class="text-emerald-500">➔</span>
                        </div>
                        <div onclick="showCategory('minyak')" class="p-4 bg-white/5 rounded-xl flex justify-between cursor-pointer hover:bg-white/10 border border-white/5 transition">
                            <span class="text-sm font-bold">⛽ Butiran Minyak</span>
                            <span class="text-red-500">➔</span>
                        </div>
                    </div>
                `,
                customClass: { popup: 'swal-corp' },
                showConfirmButton: false
            });
        }

        function showCategory(cat) {
            const curMY = (new Date().getMonth()+1).toString().padStart(2,'0') + '-' + new Date().getFullYear();
            const filtered = tasks.filter(t => t.monthYear === curMY && t.type === cat);
            let html = `<div class="space-y-3 mt-4 text-left max-h-[400px] overflow-y-auto pr-2">`;
            filtered.forEach(item => {
                html += `<div class="p-3 bg-black/20 rounded-xl border border-white/10">
                    <p class="text-[10px] font-bold text-blue-400 font-mono-corp">${item.date} (${item.day})</p>
                    <p class="text-xs font-medium text-slate-200 mt-1">${item.note}</p>
                    <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold">${item.tFrom} → ${item.tTo}</p>
                </div>`;
            });
            html += `</div>`;

            Swal.fire({
                title: `<span class="uppercase text-sm font-extrabold">${cat} Details</span>`,
                html: html,
                customClass: { popup: 'swal-corp' },
                confirmButtonText: 'BACK',
                confirmButtonColor: '#2563eb'
            }).then(() => showMonthSummary());
        }

        async function deleteEntry(docId) {
            const res = await Swal.fire({ title: 'Padam Rekod?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', customClass: {popup: 'swal-corp'} });
            if(res.isConfirmed) await db.collection("users").doc(currentUser.uid).collection("logs").doc(docId).delete();
        }

        function showDetails(t) {
            Swal.fire({
                title: `<span class="text-lg font-heading font-extrabold uppercase text-blue-500">${t.day} | ${t.date}</span>`,
                html: `
                    <div class="text-left space-y-4 py-4">
                        <div class="grid grid-cols-3 gap-2 bg-black/40 p-4 rounded-2xl font-mono-corp text-center">
                            <div><p class="text-[10px] text-slate-500 mb-1">MULA</p><p class="text-white">${t.tFrom}</p></div>
                            <div><p class="text-[10px] text-slate-500 mb-1">TRANS</p><p class="text-white">${t.tSemasa}</p></div>
                            <div><p class="text-[10px] text-slate-500 mb-1">AKHIR</p><p class="text-white">${t.tTo}</p></div>
                        </div>
                        <div class="p-4 bg-white/5 rounded-2xl border border-white/10">
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Butiran Tugasan</p>
                            <p class="text-sm leading-relaxed">${t.note}</p>
                        </div>
                        ${t.dist > 0 ? `
                        <div class="flex gap-3">
                            <div class="flex-1 p-4 bg-emerald-500/10 rounded-2xl border border-emerald-500/20 text-center">
                                <p class="text-[10px] text-emerald-500 font-bold">JARAK</p>
                                <p class="text-xl font-mono-corp font-bold text-white">${t.dist} KM</p>
                            </div>
                            ${t.rmMinyak > 0 ? `
                            <div class="flex-1 p-4 bg-red-500/10 rounded-2xl border border-red-500/20 text-center">
                                <p class="text-[10px] text-red-500 font-bold">KOS</p>
                                <p class="text-xl font-mono-corp font-bold text-white">RM ${t.rmMinyak.toFixed(2)}</p>
                            </div>` : ''}
                        </div>` : ''}
                    </div>
                `,
                customClass: { popup: 'swal-corp' },
                confirmButtonText: 'TUTUP'
            });
        }

        // --- CLOCK & INITIALIZERS ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('realTime').textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('realDate').textContent = now.toLocaleDateString('ms-MY', { day: '2-digit', month: '2-digit', year: 'numeric' });
            document.getElementById('realDay').textContent = ["Ahad","Isnin","Selasa","Rabu","Khamis","Jumaat","Sabtu"][now.getDay()];
        }, 1000);

        flatpickr("#datePicker", { dateFormat: "d-m-Y", defaultDate: "today" });
        ['#timeFrom','#timeSemasa','#timeTo'].forEach(id => flatpickr(id, { enableTime:true, noCalendar:true, dateFormat: "h:i K" }));
        
        setType('tugas');
    </script>
</body>
</html>
