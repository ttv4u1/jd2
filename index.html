    <style>
        :root { --primary: #2563eb; --glass: rgba(15, 23, 42, 0.95); }
        body { font-family: 'Inter', sans-serif; background: #0f172a; background-image: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; min-height: 100vh; }

        .btn-primary { background: #2563eb; color: white; font-weight: 700; padding: 0.8rem 1.5rem; border-radius: 0.75rem; transition: 0.2s; text-transform: uppercase; }
        
        /* New Features Style */
        .highlight-new { animation: highlight-fade 5s ease-out forwards; }
        @keyframes highlight-fade { from { background: rgba(37, 99, 235, 0.3); } to { background: transparent; } }
        
        .unread-row { border-left: 4px solid #2563eb !important; background: rgba(37, 99, 235, 0.05); }
        .is-favourite { color: #fbbf24 !important; filter: drop-shadow(0 0 5px #fbbf24); }

        #loginScreen { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; }
        .table-container { overflow-x: auto; border-radius: 1rem; }
        th { background: rgba(0,0,0,0.4); padding: 1rem; font-size: 0.65rem; color: #64748b; text-align: left; }
        td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .swal-corp { background: #0f172a !important; color: white !important; border-radius: 1.5rem !important; }
        
        .export-btn-grid { display: grid; grid-template-cols: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
        .export-btn-grid button { display: flex; flex-direction: column; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="glass-card p-10 max-w-md w-full text-center shadow-2xl">
            <div class="flex justify-center gap-6 mb-8">

            <h2 class="text-3xl font-bold mb-2 text-white">PILOT CLOUD</h2>
            <p class="text-slate-400 mb-8 font-medium text-xs uppercase tracking-[0.3em]">Master Protocol v18.9</p>
            <button onclick="login()" class="flex items-center justify-center gap-4 w-full py-4 px-6 rounded-xl font-bold border border-white/10 bg-white/5 hover:bg-white/10 transition text-white">

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">
        <header class="container mx-auto mb-8">
            <div class="glass-card p-6 flex flex-wrap justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/500px-Coat_of_arms_of_Malaysia.svg.png" class="h-14">

                        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-white">PILOT Data Process Cloud v18.9</h1>

                </div>

        <main class="container mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            <!-- INPUT COLUMN -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 border-t-4 border-blue-600 shadow-xl">
                    <div class="mb-6 flex bg-black/40 p-1 rounded-xl">
                        <button onclick="setType('tugas')" id="btnTugas" class="flex-1 py-3 text-xs font-bold rounded-lg transition-all bg-blue-600">TUGAS</button>
                        <button onclick="setType('log')" id="btnLog" class="flex-1 py-3 text-xs font-bold rounded-lg transition-all text-slate-500">GERAK</button>
                        <button onclick="setType('minyak')" id="btnMinyak" class="flex-1 py-3 text-xs font-bold rounded-lg transition-all text-slate-500">MINYAK</button>
                    </div>

                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="label-corp">Tarikh</label><input type="text" id="datePicker" class="input-field w-full"></div>
                            <div><label class="label-corp">Masa</label><input type="text" id="timeFrom" class="input-field w-full text-center"></div>

                        <div id="odoFields" class="hidden space-y-3 p-4 bg-blue-500/10 rounded-xl border border-blue-500/20">

                                <button onclick="triggerCamera()" class="px-3 py-1 bg-blue-600 rounded-lg text-[9px] font-bold text-white">📸 SCAN</button>
                                <input type="file" id="cameraInput" accept="image/*" class="hidden" onchange="processOdoImage(this)">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="number" id="odoStart" oninput="calcPreview()" class="input-field" placeholder="Mula">
                                <input type="number" id="odoEnd" oninput="calcPreview()" class="input-field" placeholder="Akhir">
                            </div>
                            <div id="distPreview" class="text-center font-mono text-emerald-400 text-[10px] font-bold">AUTO-CALC: 0 KM</div>
                        </div>

                        <div id="locationField" class="hidden">
                            <label class="label-corp">📍 Lokasi Semasa</label>
                            <input type="text" id="locationInput" class="input-field w-full text-[11px]">
                        </div>

                        <div><label class="label-corp">Perincian</label><textarea id="taskInput" rows="3" class="input-field w-full"></textarea></div>
                        <button onclick="saveEntry()" class="w-full btn-primary py-4 shadow-lg shadow-blue-500/20">Sync Data Cloud ☁️</button>
                    </div>
                </div>
                <button onclick="showExportOptions()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 rounded-xl font-bold text-xs transition uppercase tracking-widest text-white">📤 Eksport Data Rasmi</button>
            </div>

            <!-- TABLE SIDE -->
            <div class="lg:col-span-8">
                <div class="glass-card flex flex-col h-full overflow-hidden shadow-2xl">
                    <!-- TOOLBAR -->
                    <div class="p-4 bg-white/5 border-b border-white/5 flex flex-wrap justify-between items-center gap-4">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" id="selectAll" onclick="toggleSelectAll()" class="w-4 h-4 rounded border-white/20 bg-black">
                            <button onclick="bulkDelete()" class="px-3 py-1.5 bg-red-500/20 text-red-500 rounded-lg text-[10px] font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition">DELETE SELECTED</button>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="viewRecycleBin()" class="px-3 py-1.5 bg-slate-700 text-white rounded-lg text-[10px] font-bold">🗑️ RECYCLE BIN</button>
                            <button onclick="showFullAnalytics()" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-[10px] font-bold uppercase">History 📊</button>
                        </div>
                    </div>

                    <div class="table-container p-2 custom-scroll overflow-y-auto max-h-[600px]">
                        <table>
                            <thead><tr><th width="40"></th><th>Masa/Info</th><th>Butiran</th><th class="text-right">Aksi</th></tr></thead>
                            <tbody id="activeBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="container mx-auto pb-10 border-t border-white/10 pt-10 text-center md:text-left">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase">Statistik Cloud</p>
                    <div class="flex gap-4 mt-2">
                        <div><p class="text-[8px] text-slate-500 uppercase">Hari Ini</p><p id="statToday" class="text-xl font-mono text-emerald-400">0</p></div>
                        <div><p class="text-[8px] text-slate-500 uppercase">Jumlah</p><p id="statTotal" class="text-xl font-mono text-orange-400">0</p></div>
                    </div>
                </div>
                <div class="md:col-span-2 text-right">
                    <p class="text-[10px] text-slate-400 uppercase">Hakcipta © 2026 PILOT Intelligent System | JPV Malaysia</p>
                </div>
            </div>
        </footer>
    </div>

    <canvas id="procCanvas" class="hidden"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBCV-68YWkZkDjIodxWmn6z-d9H7ZS8bDs", authDomain: "bpk-cloud-system.firebaseapp.com", projectId: "bpk-cloud-system", storageBucket: "bpk-cloud-system.firebasestorage.app", messagingSenderId: "690773145817", appId: "1:690773145817:web:4a6638d25d572499fb66c8" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore(), provider = new firebase.auth.GoogleAuthProvider();
        
        let currentUser = null;
        let tasks = [];
        let selectedIds = new Set();
        let sessionNewIds = new Set(); // To track highlight for current session

        auth.onAuthStateChanged(user => {
            if (user) { 
                currentUser = user; 
                document.getElementById('loginScreen').style.display = 'none'; 
                document.getElementById('mainApp').classList.remove('hidden'); 
                document.getElementById('userName').innerText = user.displayName; 
                document.getElementById('userAvatar').src = user.photoURL; 
                syncData(); 
            } else { 
                document.getElementById('loginScreen').style.display = 'flex'; 
                document.getElementById('mainApp').classList.add('hidden'); 
            }
        });

        async function login() { try { await auth.signInWithPopup(provider); } catch (e) { auth.signInWithRedirect(provider); } }
        function logout() { auth.signOut(); }

        function syncData() {
            if(!currentUser) return;
            // Listen for data that is NOT deleted
            db.collection("users").doc(currentUser.uid).collection("logs").orderBy("id", "desc").onSnapshot(snap => {
                tasks = snap.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                renderUI();
                updateStats();
            });
        }

        function renderUI() {
            const body = document.getElementById('activeBody'); 
            body.innerHTML = '';
            
            // Filter non-deleted tasks
            const activeTasks = tasks.filter(t => !t.isDeleted);
            
            activeTasks.forEach(t => {
                const tr = document.createElement('tr');
                const isNew = sessionNewIds.has(t.docId) ? 'highlight-new' : '';
                const isUnread = !t.isRead ? 'unread-row' : '';
                
                tr.className = `hover:bg-white/5 cursor-pointer border-b border-white/5 transition-all ${isNew} ${isUnread}`;
                tr.onclick = () => markAsRead(t.docId);

                tr.innerHTML = `
                    <td onclick="event.stopPropagation()"><input type="checkbox" onchange="toggleSelect('${t.docId}')" ${selectedIds.has(t.docId) ? 'checked' : ''} class="w-4 h-4 rounded border-white/10 bg-black"></td>
                    <td onclick="showDetails('${t.docId}')">
                        <div class="font-bold text-[11px] text-white">${t.date}</div>
                        <div class="text-[9px] text-blue-500 font-bold uppercase">${t.day} | ${t.tFrom}</div>
                    </td>
                    <td onclick="showDetails('${t.docId}')">
                        <div class="text-xs font-medium text-slate-200 line-clamp-1">${t.note}</div>
                        <div class="text-[9px] mt-1 text-slate-500 flex gap-2">
                            ${t.dist > 0 ? `<span class="text-emerald-500 font-bold">${t.dist} KM</span>` : ''}
                            <span class="truncate">📍 ${t.location}</span>
                        </div>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="event.stopPropagation(); toggleFav('${t.docId}', ${t.isFav})" class="text-lg ${t.isFav ? 'is-favourite' : 'text-slate-600'}">★</button>
                            <button onclick="event.stopPropagation(); deleteEntry('${t.docId}')" class="p-2 text-red-500 hover:scale-125 transition">🗑️</button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function saveEntry() {
            const date = document.getElementById('datePicker').value;
            const time = document.getElementById('timeFrom').value;
            if(!date || !time) return Swal.fire('Ralat', 'Tarikh & Masa wajib diisi.', 'error');

            const entry = {
                id: Date.now(),
                type: window.currentType || 'tugas',
                date,
                day: getDayName(date),
                monthYear: date.split('-')[1] + '-' + date.split('-')[2],
                tFrom: time,
                odoStart: parseFloat(document.getElementById('odoStart').value) || 0,
                odoEnd: parseFloat(document.getElementById('odoEnd').value) || 0,
                dist: (parseFloat(document.getElementById('odoEnd').value) || 0) - (parseFloat(document.getElementById('odoStart').value) || 0),
                location: document.getElementById('locationInput')?.value || '-',
                note: document.getElementById('taskInput').value || '-',
                isDeleted: false,
                isRead: false,
                isFav: false
            };

            const docRef = await db.collection("users").doc(currentUser.uid).collection("logs").add(entry);
            sessionNewIds.add(docRef.id);
            setTimeout(() => { sessionNewIds.delete(docRef.id); renderUI(); }, 5000);

            // Clear inputs
            ['odoStart','odoEnd','taskInput','locationInput'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ''; });
            Swal.fire({ icon:'success', title:'Berjaya Disimpan', timer:1000, showConfirmButton:false, customClass:{popup:'swal-corp'} });
        }

        // --- NEW MANAGEMENT FUNCTIONS ---

        async function markAsRead(docId) {
            await db.collection("users").doc(currentUser.uid).collection("logs").doc(docId).update({ isRead: true });
        }

        async function toggleFav(docId, currentStatus) {
            await db.collection("users").doc(currentUser.uid).collection("logs").doc(docId).update({ isFav: !currentStatus });
        }

        function toggleSelect(id) {
            if(selectedIds.has(id)) selectedIds.delete(id);
            else selectedIds.add(id);
        }

        function toggleSelectAll() {
            const activeTasks = tasks.filter(t => !t.isDeleted);
            if(selectedIds.size === activeTasks.length) selectedIds.clear();
            else activeTasks.forEach(t => selectedIds.add(t.docId));
            renderUI();
        }

        async function deleteEntry(docId) {
            const result = await Swal.fire({
                title: 'Pindah ke Tong Sampah?',
                text: "Data boleh dipulihkan semula nanti.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Padam',
                customClass: { popup: 'swal-corp' }
            });

            if (result.isConfirmed) {
                await db.collection("users").doc(currentUser.uid).collection("logs").doc(docId).update({ isDeleted: true });
            }
        }

        async function bulkDelete() {
            if(selectedIds.size === 0) return;
            const result = await Swal.fire({ title: `Padam ${selectedIds.size} item?`, icon: 'warning', showCancelButton: true, customClass: { popup: 'swal-corp' } });
            if (result.isConfirmed) {
                const batch = db.batch();
                selectedIds.forEach(id => {
                    const ref = db.collection("users").doc(currentUser.uid).collection("logs").doc(id);
                    batch.update(ref, { isDeleted: true });
                });
                await batch.commit();
                selectedIds.clear();
                Swal.fire('Selesai', 'Data dipindahkan ke Recycle Bin', 'success');
            }
        }

        function viewRecycleBin() {
            const deleted = tasks.filter(t => t.isDeleted);
            let html = `<div class="space-y-2 text-left max-h-96 overflow-y-auto">`;
            if(deleted.length === 0) html += `<p class="text-center text-slate-500 py-10">Tiada item dipadam.</p>`;
            deleted.forEach(t => {
                html += `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg border border-white/5">
                        <div class="text-[10px]">
                            <p class="font-bold text-white">${t.date} - ${t.tFrom}</p>
                            <p class="text-slate-400 truncate w-40">${t.note}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="restoreItem('${t.docId}')" class="px-2 py-1 bg-emerald-600 text-[9px] font-bold rounded">RESTORE</button>
                            <button onclick="hardDeleteItem('${t.docId}')" class="px-2 py-1 bg-red-600 text-[9px] font-bold rounded">PURGE</button>
                        </div>
                    </div>
                `;
            });
            html += `</div><button onclick="emptyBin()" class="w-full mt-4 py-2 bg-red-500/20 text-red-500 text-[10px] font-bold rounded-lg border border-red-500/20">KOSONGKAN TONG SAMPAH</button>`;

            Swal.fire({ title: 'RECYCLE BIN', html, showConfirmButton: false, showCloseButton: true, customClass: { popup: 'swal-corp' } });
        }

        async function restoreItem(id) {
            await db.collection("users").doc(currentUser.uid).collection("logs").doc(id).update({ isDeleted: false });
            viewRecycleBin();
        }

        async function hardDeleteItem(id) {
            await db.collection("users").doc(currentUser.uid).collection("logs").doc(id).delete();
            viewRecycleBin();
        }

        async function emptyBin() {
            const deleted = tasks.filter(t => t.isDeleted);
            if(deleted.length === 0) return;
            const result = await Swal.fire({ title: 'Kosongkan Semua?', text: "Tindakan ini kekal dan tidak boleh diundur!", icon: 'error', showCancelButton: true });
            if(result.isConfirmed) {
                const batch = db.batch();
                deleted.forEach(t => {
                    const ref = db.collection("users").doc(currentUser.uid).collection("logs").doc(t.docId);
                    batch.delete(ref);
                });
                await batch.commit();
                Swal.fire('Dibersihkan', 'Tong sampah kini kosong.', 'success');
            }
        }

        // --- PREVIOUS DATA MIGRATION (MOCK DATA) ---
        async function migrateOldData() {
            const oldData = [
                { date: "15-04-2026", day: "RABU", tFrom: "08:30 AM", location: "Pejabat Veterinar Putrajaya", note: "Mesyuarat mingguan sistem v18.7", dist: 0 },
                { date: "16-04-2026", day: "KHAMIS", tFrom: "10:00 AM", location: "Ladang Ternakan Berkat", note: "Pemeriksaan kesihatan lembu siri 2", dist: 45 },
                { date: "17-04-2026", day: "JUMAAT", tFrom: "02:30 PM", location: "Klinik Haiwan Kesayangan", note: "Audit stok vaksin tahunan", dist: 12 }
            ];
            
            for(let data of oldData) {
                const check = tasks.find(t => t.note === data.note);
                if(!check) {
                    await db.collection("users").doc(currentUser.uid).collection("logs").add({
                        ...data, id: Date.now(), isDeleted: false, isRead: true, isFav: false, mYear: "04-2026", type: 'tugas'
                    });
                }
            }
        }

        // --- UTILS ---
        function updateStats() {
            const active = tasks.filter(t => !t.isDeleted);
            document.getElementById('statTotal').innerText = active.length;
            const today = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
            document.getElementById('statToday').innerText = active.filter(t => t.date === today).length;
        }

        function setType(type) {
            window.currentType = type;
            ['btnTugas', 'btnLog', 'btnMinyak'].forEach(id => document.getElementById(id).className = "flex-1 py-3 text-xs font-bold rounded-lg transition-all text-slate-500");
            const btnMap = {tugas: 'btnTugas', log: 'btnLog', minyak: 'btnMinyak'};
            document.getElementById(btnMap[type]).className = `flex-1 py-3 text-xs font-bold rounded-lg transition-all bg-blue-600 text-white`;
            
            document.getElementById('odoFields').classList.toggle('hidden', type === 'tugas');
            document.getElementById('locationField').classList.toggle('hidden', type === 'tugas');
        }

        function getDayName(dateStr) { 
            const p = dateStr.split('-'); 
            return ["AHAD","ISNIN","SELASA","RABU","KHAMIS","JUMAAT","SABTU"][new Date(p[2], p[1]-1, p[0]).getDay()]; 
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('realTime').textContent = n.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true }).toUpperCase();
            document.getElementById('realDay').textContent = ["AHAD","ISNIN","SELASA","RABU","KHAMIS","JUMAAT","SABTU"][n.getDay()];
        }, 1000);

        flatpickr("#datePicker", { dateFormat: "d-m-Y", defaultDate: "today" });
        flatpickr("#timeFrom", { enableTime:true, noCalendar:true, dateFormat: "h:i K", defaultDate: new Date() });
        
        // Initial Trigger
        setTimeout(() => { if(currentUser) migrateOldData(); }, 3000);

    </script>
</body>
</html>
